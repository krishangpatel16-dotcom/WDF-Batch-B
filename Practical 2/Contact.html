<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudentHub | Contact</title>
</head>
<body style="background-color:lightgray;">

  <main id="main">
    <section aria-labelledby="contact-heading">
      <h1 id="contact-heading">Contact StudentHub</h1>
      <p>Reach out for help with your account, registration, or campus services.</p>
    </section>
    <section aria-labelledby="contact-info">
      <h2 id="contact-info">Support information</h2>
      <address>
        <p>studenthub@charusat.edu</p>
        <p>Phone: 7893400935</p>
      </address>
    </section>
    <section aria-labelledby="contact-form-heading">
      <h2 id="contact-form-heading">Send us a message</h2>
      <form action="#" method="post">
        <p>
          <label for="contact-name">Name</label><br />
          <input type="text" id="contact-name" name="name" required />
        </p>
        <p>
          <label for="contact-email">Email</label><br />
          <input type="email" id="contact-email" name="email" required />
        </p>
        <p>
          <label for="contact-message">Message</label><br />
          <textarea id="contact-message" name="message" rows="5" required></textarea>
        </p>
        <button type="submit">Submit</button>
      </form>
    </section>
  </main>
  <nav aria-label="Primary navigation">
      <ul>
        <li><a href="Home.html">Back To Home</a></li>
      </ul>
    </nav>
  <footer>
    <p>&copy; 2026 StudentHub</p>
  </footer>
</body>
</html>

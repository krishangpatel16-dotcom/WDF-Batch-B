<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudentHub | Feedback</title>
</head>
<body  style="background-color:powderblue;">

  <main id="main">
    <section aria-labelledby="feedback-heading">
      <h1 id="feedback-heading">Share your feedback</h1>
      <p>Tell us how StudentHub can serve you better.</p>
    </section>
    <section aria-labelledby="feedback-form-heading">
      <h2 id="feedback-form-heading">Feedback form</h2>
      <form action="#" method="post">
        <p>
          <label for="feedback-name">Name</label><br />
          <input type="text" id="feedback-name" name="name" />
        </p>
        <p>
          <label for="feedback-email">Email</label><br />
          <input type="email" id="feedback-email" name="email" />
        </p>
        <p>
          <label for="feedback-comments">Comments</label><br />
          <textarea id="feedback-comments" name="comments" rows="6" required></textarea>
        </p>
        <button type="submit">Send feedback</button>
      </form>
    </section>
  </main>
      <nav aria-label="Primary navigation">
      <ul>
        <li><a href="Home.html">Back To Home</a></li>
      </ul>
    </nav>
  <footer>
    <p>&copy; 2026 StudentHub</p>
  </footer>
</body>
</html>
